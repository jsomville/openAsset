<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Asset - Device Manager</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="header-left">
                <h1 class="logo">Open Asset</h1>
                <span class="version" id="version">v1.0.0</span>
            </div>
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
                <span class="toggle-icon">🌙</span>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container">
        <div class="page-header">
            <h2>Device Management</h2>
            <div class="controls">
                <input 
                    type="text" 
                    id="searchInput" 
                    class="search-box" 
                    placeholder="Search devices by hostname..."
                    aria-label="Search devices"
                >
                <button class="btn btn-primary" id="refreshBtn" aria-label="Refresh device list">
                    🔄 Refresh
                </button>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="loading-state" style="display: none;">
            <div class="spinner"></div>
            <p>Loading devices...</p>
        </div>

        <!-- Error State -->
        <div id="errorState" class="alert alert-error" style="display: none;">
            <div id="errorMessage"></div>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="empty-state" style="display: none;">
            <p>No devices found. Start by adding a device.</p>
        </div>

        <!-- Devices Table -->
        <div class="table-wrapper">
            <table class="devices-table" id="devicesTable">
                <thead>
                    <tr>
                        <th>Hostname</th>
                        <th>Host</th>
                        <th>OS</th>
                        <th>CPU</th>
                        <th>RAM</th>
                        <th>Type</th>
                        <th>Status</th>
                        <th>Last Updated</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="devicesContainer">
                </tbody>
            </table>
        </div>
    </main>

    <!-- Modal for Device Details -->
    <div id="detailsModal" class="modal" style="display: none;">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h2 id="detailsTitle">Device Details</h2>
                <button class="modal-close" id="closeModal" aria-label="Close modal">&times;</button>
            </div>
            <div class="modal-body">
                <!-- Device Header Info -->
                <div id="deviceHeader" class="device-header-info"></div>
                
                <!-- Packages Section -->
                <div id="packagesSection" class="packages-section" style="display: none;">
                    <h3>Assigned Packages</h3>
                    <div id="packloadingState" class="mini-loading" style="display: none;">
                        <div class="mini-spinner"></div>
                    </div>
                    <div id="packagesList" class="packages-list"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="closeModalBtn">Close</button>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal" style="display: none;">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h2>Confirm Delete</h2>
                <button class="modal-close" id="closeDeleteModal" aria-label="Close modal">&times;</button>
            </div>
            <div class="modal-body">
                <p id="deleteMessage"></p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelDeleteBtn">Cancel</button>
                <button class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
